command: ["uv", "run", "start-app"]
# Backend on :8000, chat UI on :3000 (proxied by the app platform)

env:
  - name: MLFLOW_TRACKING_URI
    value: "databricks"
  - name: MLFLOW_REGISTRY_URI
    value: "databricks-uc"
  - name: API_PROXY
    value: "http://localhost:8000/invocations"
  - name: CHAT_APP_PORT
    value: "3000"
  - name: CHAT_PROXY_TIMEOUT_SECONDS
    value: "300"
  - name: DATABRICKS_CLAUDE_ENDPOINT
    value: "databricks-claude-opus-4-7"
  - name: FABRIC_MCP_URL
    value: "https://mcp-bi-fabrics-auditor-7405609570261849.9.azure.databricksapps.com/mcp"

  # SP credentials + tenant/client identity — secret-backed app resources (never inline in git)
  - name: FABRIC_TENANT_ID
    valueFrom: tenant_id
  - name: FABRIC_CLIENT_ID
    valueFrom: client_id
  - name: FABRIC_CLIENT_SECRET
    valueFrom: client_secret

  # Fabric REST API (public endpoint — safe inline)
  - name: FABRIC_CAPACITIES_URL
    value: "https://api.fabric.microsoft.com/v1/capacities"

  # Per-user attribution via Log Analytics (the 30% "who") — workspace GUID via resource
  - name: FABRIC_LA_WORKSPACE_ID
    valueFrom: la_workspace_id

  # Capacity Events Eventhouse (live CU%) — cluster/db via resources; table name is non-sensitive
  - name: FABRIC_CAPACITY_EVENTS_CLUSTER
    valueFrom: capacity_events_cluster
  - name: FABRIC_CAPACITY_EVENTS_DB
    valueFrom: capacity_events_db
  # TABLE (not KQL): the collector auto-generates the schema-tolerant time-filtered query
  # (`<table> | where ingestion_time() > ago({window})`). Setting FABRIC_CAPACITY_EVENTS_KQL
  # to a bare table name was pulling ALL history and returning impossible peaks (e.g. 8,964%).
  - name: FABRIC_CAPACITY_EVENTS_TABLE
    value: "Monitoring_Eventhouse"

  # Top-level operations allowlist (drops VertiPaqSE* sub-query children that double-count cost
  # and pollute timelines). Live-verified op names on this tenant (2026-07-08): QueryEnd /
  # CommandEnd / DiscoverEnd all carry genuine top-level cost — DiscoverEnd is deliberately
  # INCLUDED (our biggest real spikes are expensive metadata discovers on large models; the
  # recommended trio alone would hide them).
  - name: FABRIC_EVENT_OPERATIONS
    value: "QueryEnd,CommandEnd,ProgressReportEnd,DiscoverEnd"

  # Interim history seam: each interactive run_audit appends its run record here, activating
  # whats_changed + history enrichment. LOCAL container path (the App can't write /Volumes) —
  # resets on redeploy; the scheduled Job (AUDIT_HISTORY_PATH, same contract) is the durable
  # writer when it lands.
  - name: FABRIC_HISTORY_PATH
    value: "/tmp/fabric-audit/history.json"